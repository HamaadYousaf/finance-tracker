spring.application.name=financetracker
# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/financetracker
spring.datasource.username=postgres
spring.datasource.password=password

# JDBC Driver (optional but good to include)
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Pretty SQL logs
spring.jpa.properties.hibernate.format_sql=true

# Dialect (optional in newer versions but safe)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# REDIS (if you're using it)
# ===============================
spring.redis.host=localhost
spring.redis.port=6379

# ===============================
# SERVER (optional)
# ===============================
server.port=8080