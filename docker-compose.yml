version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: finance-tracker-db
    restart: always
    environment:
      POSTGRES_DB: financetracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: